name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq openssl

      - name: Run unit tests
        run: ./tests/lib/bats-core/bin/bats tests/unit/ --recursive --tap

      - name: Run fuzz tests
        run: FUZZ_ITERATIONS=50 ./tests/lib/bats-core/bin/bats tests/fuzz/ --recursive
        timeout-minutes: 10
